  description: One REST API and one API token to access 50+ image and video generation models from
    Black Forest Labs (Flux), Google (Imagen, Nano Banana, Veo), OpenAI (gpt-image), Runway, Kling,
    ByteDance (Seedream, Seedance, SeedEdit), MiniMax (Hailuo), Alibaba (Wan), Luma (Ray), xAI (Grok
    Imagine), Ideogram, Qwen, and Lightricks. Asynchronous job pattern with poll-or-webhook delivery,
    asset upload management, custom LoRA training, and node-app execution — all on https://api.krea.ai
    with Bearer-token authentication and a unified compute-unit billing model.
