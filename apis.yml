- aid: krea-ai:krea-jobs-api
  name: Krea Jobs API
  tags:
  - AI
  - Jobs
  - Async
  humanURL: https://docs.krea.ai/api-reference/general/list-jobs
  properties:
  - url: https://docs.krea.ai/api-reference/general/list-jobs
    type: Documentation
  - url: https://docs.krea.ai/developers/job-lifecycle
    name: Job Lifecycle
    type: Documentation
  - url: openapi/krea-api-openapi.json
    type: OpenAPI
  description: Manage the asynchronous lifecycle of every generation request. GET /jobs lists jobs,
    GET /jobs/{id} returns the current state (queued, processing, completed, failed, cancelled) with
    result.urls or result.error, and DELETE /jobs/{id} cancels a queued or running job. Only completed
    jobs consume compute units — failed and cancelled jobs are free.
- aid: krea-ai:krea-node-apps-api
  name: Krea Node Apps API
  tags:
  - AI
  - Workflows
  - Automation
  humanURL: https://docs.krea.ai/api-reference/node-apps/execute-a-node-app
  properties:
  - url: https://docs.krea.ai/api-reference/node-apps/execute-a-node-app
    type: Documentation
  - url: openapi/krea-api-openapi.json
    type: OpenAPI
  description: Execute Krea Nodes workflows — visual pipelines built in the Krea Nodes tool — directly
    from the API. GET /node-apps/{id} inspects a node app by version ID and POST /node-apps/{id}/execute
    runs it with user-supplied inputs, returning a job ID that follows the standard Krea async pattern.
