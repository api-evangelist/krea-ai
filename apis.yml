- type: Features
  data:
  - One Bearer-token Krea API at https://api.krea.ai exposing 67 endpoints across image, video,
    enhance, assets, styles, jobs, and node-apps
  - 22 image generation models across Black Forest Labs Flux (1 dev, 1 Kontext, 1.1 Pro, 1.1 Pro
    Ultra), Google Imagen 3/4 family and Nano Banana / Nano Banana 2 / Nano Banana Pro, OpenAI
    gpt-image and gpt-image-2, ByteDance Seedream 4 / Seedream 5 Lite / SeedEdit, Ideogram 2
    Turbo and Ideogram 3, Runway Gen-4 Image, Luma UNI-1, Qwen 2512, and Z Image
  - 31 video generation models across Google Veo 2 / Veo 3 / Veo 3 Fast / Veo 3.1 / Veo 3.1
    Fast / Veo 3.1 Lite, Runway Gen-3, Gen-4 Video, Gen-4.5, and Aleph, Kling 1.0 through 3.0
    plus Kling o1, MiniMax Hailuo and Hailuo 02 / 2.3 / 2.3 Fast, Alibaba Wan 2.1 / 2.2 / 2.5,
    ByteDance Seedance Pro and Seedance Pro Fast, Luma Ray 2, Lightricks LTX-2.3 22B, and xAI
    Grok Imagine
  - Topaz-powered image enhancement at /generate/enhance/topaz with standard, generative, and
    bloom variants delivering up to 22K upscales
  - Krea Realtime experience with sub-50ms image generation and an open-source Realtime 14B
    autoregressive video model distilled from Wan 2.1 (CC BY-NC-SA 4.0)
  - Open-source FLUX.1 Krea [dev] 12B rectified-flow image model from a research collaboration
    with Black Forest Labs, with weights on Hugging Face
  - Custom LoRA style training, search, sharing, and workspace controls via the Styles API
  - Krea Nodes visual workflow tool exposed programmatically via /node-apps/{id}/execute
  - Asset management API for uploading and reusing images, videos, audio, and 3D models across
    generation jobs
  - Unified asynchronous job lifecycle (queued, processing, completed, failed, cancelled) with
    GET /jobs/{id} polling at 2-5s intervals and DELETE /jobs/{id} cancellation
  - Webhook delivery via X-Webhook-URL header — full job payload POSTed on terminal state with
    no separate webhook subscription registration
  - Compute-unit billing model — only completed jobs consume units; failed and cancelled jobs
    are free
  - Plan-tiered rate limits with job-backlog queueing instead of hard rejection
  - Public OpenAPI 3.1.0 spec at https://docs.krea.ai/api-reference/openapi.json plus Postman
    import and an interactive in-browser playground
  - Code samples in cURL, Python, JavaScript, and Go on every endpoint
  - Workspace, teams, SAML SSO, domain verification, model access controls, per-member spend
    limits, audit logs, and a separate Business / Enterprise tier
  - Used by Lego, Samsung, Nike, Microsoft, and Shopify
