position: Consuming
description: Krea is a real-time AI creative suite that lets designers, filmmakers, brand teams, and
  everyday creators generate, edit, enhance, and animate images and videos with professional controls
  from a single workspace. The Krea API at https://api.krea.ai exposes 50+ third-party and proprietary
  image and video models — Flux, Imagen, Veo, Nano Banana, gpt-image, Runway, Kling, Seedream,
  Seedance, Hailuo, Wan, Ray, Grok Imagine, Ideogram, Qwen, Z Image, Topaz, and more — through one
  Bearer-token-authenticated REST surface with a unified async job lifecycle, compute-unit billing,
  asset management, LoRA style training, Nodes workflow execution, and webhook delivery. Krea also
  publishes open-source models including FLUX.1 Krea [dev] (in collaboration with Black Forest Labs)
  and Krea Realtime 14B, a Self-Forcing distillation of Wan 2.1 that produces 11 fps text-to-video on
  an NVIDIA B200.
